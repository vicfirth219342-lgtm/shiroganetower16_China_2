<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>感謝您的諮詢｜白金塔</title>
<meta name="robots" content="noindex">

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=GT-WVGMTXML"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'GT-WVGMTXML');
  gtag('config', 'AW-18240219163');
  gtag('config', 'G-XXXXXXXXXX');

  /* Google Ads コンバージョン計測（フォーム送信完了＝/thanks到達） */
  gtag('event', 'conversion', { send_to: 'AW-18240219163' });
  /* GA4側のリード獲得イベント（任意） */
  gtag('event', 'generate_lead', {
    event_category: 'contact',
    event_label: 'inquiry',
    currency: 'JPY',
    value: 0
  });
</script>

<style>
:root {
  --gold:        #C5A55A;
  --gold-light:  #D4BC82;
  --gold-dark:   #A8883E;
  --white:       #FFFFFF;
  --black:       #0A0A0A;
  --serif: "Noto Serif TC","Noto Serif JP","Hiragino Mincho ProN","Yu Mincho",serif;
  --sans:  "Noto Sans TC","Noto Sans JP","Hiragino Sans","Helvetica Neue",Arial,sans-serif;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ overflow-x:hidden; }
body{
  background:var(--black);
  color:var(--white);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  font-family:var(--sans);
}
.thanks-box{
  text-align:center;
  max-width:560px;
}
.gold-line{
  width:64px;height:1px;background:var(--gold);
  margin:0 auto 28px;
}
.thanks-title{
  font-family:var(--serif);
  font-size:clamp(22px,3vw,30px);
  color:var(--gold);
  letter-spacing:.08em;
  line-height:1.7;
  margin-bottom:18px;
}
.thanks-body{
  font-size:clamp(13px,1.6vw,15px);
  color:rgba(255,255,255,.75);
  line-height:1.9;
  letter-spacing:.03em;
  margin-bottom:40px;
}
.thanks-back{
  display:inline-block;
  padding:14px 36px;
  border:1px solid var(--gold);
  color:var(--gold-light);
  text-decoration:none;
  font-family:var(--sans);
  font-size:12px;
  letter-spacing:.12em;
  border-radius:2px;
  transition:background .3s ease,color .3s ease;
}
.thanks-back:hover{
  background:var(--gold);
  color:var(--black);
}
</style>
</head>
<body>
  <div class="thanks-box">
    <div class="gold-line"></div>
    <h1 class="thanks-title">感謝您的諮詢</h1>
    <p class="thanks-body">
      感謝您的諮詢。<br>
      我們將於24小時內與您聯繫。
    </p>
    <a class="thanks-back" href="/">返回首頁</a>
  </div>
</body>
</html>
